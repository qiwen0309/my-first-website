<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hinoki</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&family=Noto+Serif:wght@300;400;500;600&family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Page: Home -->
<div class="page active" id="page-home">
    <!-- Mobile -->
    <div class="home-mobile">
        <div class="home-hero">
            <img class="home-hero-bg" src="" alt="">
            <div class="home-hero-content">
                <div class="home-logo-area">
                    <h1 class="home-title">Hinoki</h1>
                    <div class="home-divider"></div>
                    <p class="home-subtitle"></p>
                </div>
            </div>
            <div class="home-footer-cta">
                <button class="btn-primary" data-nav="product">
                    <span>START ORDERING</span>
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"></svg>
                </button>
            </div>
        </div>
    </div>
    <!-- DESKTOP -->
    <div class="home-desktop">
        <nav class="topnav">
            <div class="topnav-inner">
                <div class="topnav-logo logo-font" data-nav="home">Hinoki</div>
                <div class="topnav-links">
                    <a class="nav-link active" data-nav="home">HOME</a>
                    <a class="nav-link" data-nav="ai-chef">AI CHEF</a>
                    <a class="nav-link" data-nav="product">MENU</a>
                    <a class="nav-link" data-nav="gift">GIFT CARD</a>
                </div>
                <button class="btn-dark" data-nav="product">BOOK NOW</button>
            </div>
        </nav>
    <div class="home-desktop-hero">
        <img class="home-desktop-hero-bg" src="" alt="">
        <div class="home-desktop-overlay"></div>
        <div class="home-desktop-content">
            <h1 class="home-desktop-title">Hinoki</h1>
            <button class="" data-nav="product">
                <span>START ORDERING</span>
            </button>
        </div>
    </div>
    <footer class="footer">
      <div class="footer-inner">
        <span class="logo-font footer-logo">Hinoki</span>
        <span class="footer-copy">© 2024 HINOKI. DESIGNED FOR SILENCE.</span>
      </div>
    </footer>
  </div>
</div>

<!-- Page: Product -->
<div class="page" id="page-product">
    <!-- MOBILE -->
    <div class="product-mobile">
        <div class="product-mobile-sticky">
          <header class="mobile-header">
            <button class="icon-btn back-btn" data-nav="home">
                <svg></svg>
            </button>
            <span class="logo-font mobile-logo">Hinoki</span>
        <button class="mobile-aichef-btn" data-nav="ai-chef">AI CHEF</button>
      </header>
      <div class="product-search-bar">
        <svg></svg>
        <input type="text" placeholder="Search" id="search-input-mobile" class="search-input">
      </div>
      <div class="product-cat-bar">
        <button class="cat-btn active" data-cat="A La Carte">A La Carte</button>
        <button class="cat-btn" data-cat="Sushi Pack">Sushi Pack</button>
        <button class="cat-btn" data-cat="Nigiri Pack">Nigiri Pack</button>
      </div>
    </div>
    <div class="product-section-header">
        <h2 class="section-title-serif">Seasonal<br>Nigiri<br>Selection</h2>
      </div>
      <div class="menu-list" id="menu-list-mobile"></div>
      <button class="cart-fab" data-nav="cart" id="cart-fab">
        <svg></svg>
        <span class="cart-fab-badge" id="cart-fab-badge">0</span>
      </button>
    </div>
